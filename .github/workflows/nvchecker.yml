name: nvchecker

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 08 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eix:
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3
      options: --privileged
    outputs:
      pkgs: ${{ steps.eix.outputs.pkgs }}
    steps:
      - name: sync gentoo main tree
        run: |
          emerge-webrsync

      - name: setup features
        run: |
          echo 'FEATURES="getbinpkg"' >> /etc/portage/make.conf
          getuto

      - name: install depends
        run: |
          emerge --verbose --quiet --jobs $(nproc) --autounmask y --autounmask-continue y \
          app-eselect/eselect-repository \
          app-portage/eix \
          dev-vcs/git

      - name: checkout
        uses: actions/checkout@v6

      - name: eix
        id: eix
        run: |
          # eselect
          echo "::group::eselect repository add and sync"
          repo_name=$(cat profiles/repo_name)
          eselect repository add "$repo_name" git "file://${PWD}" || true
          emerge --sync "$repo_name"
          egencache --jobs=$(nproc) --update --repo "$repo_name" &> /dev/null
          eix-update
          echo "::endgroup::"
          # eix
          echo "::group::eix search packages"
          pkgs=$(ACCEPT_LICENSE="*" ACCEPT_KEYWORDS="~amd64 ~arm64 ~loong ~riscv" EIX_LIMIT=0 NAMEVERSION="<category>/<name>-<version>\n" eix --pure-packages --in-overlay "$repo_name" --format '<bestversion:NAMEVERSION>')
          pkgs=$(qatom -F "\"%{CATEGORY}/%{PN}\": \"%{PV}\"," $pkgs) # remove revision
          pkgs="{ ${pkgs::-1} }"
          echo $pkgs
          # use multiine string:
          # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands#setting-an-output-parameter
          {
            echo 'pkgs<<EOF'
            echo "$pkgs"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

  nvchecker:
    needs: eix
    runs-on: ubuntu-latest
    outputs:
      nvcmp: ${{ steps.nvchecker.outputs.nvcmp }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: install depends
        run: |
          pip install nvchecker jq --break-system-packages

      - name: echo pkgs
        run: |
          echo 'eix pkgs:'
          echo '${{ needs.eix.outputs.pkgs }}'

      - name: nvchecker
        id: nvchecker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::nvchecker"
          cd .github/workflows/
          echo '${{ needs.eix.outputs.pkgs }}' > old_ver.json
          echo -e "[keys]\ngithub = \"${{ secrets.GITHUB_TOKEN }}\"" > keyfile.toml
          nvchecker --file overlay.toml --keyfile keyfile.toml
          echo "::endgroup::"

          echo "::group::nvcmp"
          echo "nvcmp=$(nvcmp --file overlay.toml --json --newer | jq 'map({name, newver, oldver})' | jq -c .)" >> $GITHUB_OUTPUT
          echo "::endgroup::"

  issues-bumper:
    needs: nvchecker
    if: needs.nvchecker.outputs.nvcmp != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.nvchecker.outputs.nvcmp || '[]') }}
    steps:
      - name: Checkout bumpbot
        uses: actions/checkout@v6
        with:
          repository: "nuclear06/bumpbot"

      - name: Checkout overlay
        uses: actions/checkout@v6
        with:
          path: "overlay"

      - name: update issues
        timeout-minutes: 1
        env:
          name: ${{ matrix.name }}
          newver: ${{ matrix.newver }}
          oldver: ${{ matrix.oldver }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GENTOO_DEPS_REPOSITORY: ${{ vars.GENTOO_DEPS_REPOSITORY }}
          GENTOO_DEPS_GITHUB_TOKEN: ${{ secrets.GENTOO_DEPS_GITHUB_TOKEN }}
        run: |
          repo_dir="overlay"
          repo_name=$(cat "${repo_dir}/profiles/repo_name")
          pkg_path="${repo_dir}/${name}"
          ebuild_file=$(find "$pkg_path" -name "*.ebuild" | head -n 1)
          description=""
          homepage=""
          if [[ -f "$ebuild_file" ]]; then
            description=$(grep -E '^DESCRIPTION=' "$ebuild_file" | head -n 1 | sed -E 's/^DESCRIPTION=["'\'']?([^"'\'']*)["'\'']?/\1/')
            homepage=$(grep -E '^HOMEPAGE=' "$ebuild_file" | head -n 1 | sed -E 's/^HOMEPAGE=["'\'']?([^"'\'']*)["'\'']?/\1/')
          fi
          go run . --file "${repo_dir}/.github/workflows/overlay.toml" --name "$name" --newver "$newver" --oldver "$oldver" --description "$description" --homepage "$homepage"
